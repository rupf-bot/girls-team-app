function renderParentHome() {
  const player = PLAYERS.find(p => p.id === state.currentUser.playerId);
  if (!player) return;

  document.getElementById('parent-home-name').textContent = 'Hallo ' + player.name.split(' ')[0];

  // 1. Next event as hero with direct status actions
  const upcoming = getUpcomingEvents();
  const next = upcoming[0] || null;
  document.getElementById('parent-home-hero').innerHTML = next
    ? renderParentHero(next, player.id)
    : '<div class="empty-state"><div class="empty-state-icon">📅</div><div class="empty-state-text">Keine kommenden Events</div></div>';
  if (next) scheduleParentHomeRefresh(next);

  // 2. Season stats
  const pastTrainings = state.events.filter(e => e.type === 'training' && isPast(e.date));
  const pastTournaments = state.events.filter(e => e.type === 'tournament' && isPast(e.date));
  const trainingsAttended = pastTrainings.filter(e => getStatus(e.id, player.id) === 'coming').length;
  const trainingsInjured  = pastTrainings.filter(e => getStatus(e.id, player.id) === 'injured').length;
  const trainingsAbsent   = pastTrainings.filter(e => getStatus(e.id, player.id) === 'absent').length;
  const tournamentsPlayed = getSquadInCount(player.id);
  const tournamentsBenched = getBenchedCount(player.id);
  const trnPct = pastTrainings.length ? Math.round(trainingsAttended / pastTrainings.length * 100) : 0;
  const tourPct = pastTournaments.length ? Math.round(tournamentsPlayed / pastTournaments.length * 100) : 0;
  const trnDetail = trainingsInjured || trainingsAbsent
    ? `<div style="font-size:11px;color:rgba(255,255,255,0.7);margin-top:6px">${[trainingsAbsent ? `${trainingsAbsent}× abgesagt` : '', trainingsInjured ? `${trainingsInjured}× verletzt/krank` : ''].filter(Boolean).join(' · ')}</div>`
    : '';
  const tourDetail = tournamentsBenched
    ? `<div style="font-size:11px;color:rgba(255,255,255,0.7);margin-top:6px">${tournamentsBenched}× verfügbar, aber nicht aufgeboten</div>`
    : '';

  document.getElementById('parent-home-stats').innerHTML = `
    <div class="home-stat-card" onclick="parentNavTo('events','training')" style="background:linear-gradient(135deg, var(--brand-blue) 0%, var(--brand-blue-mid) 100%);margin-bottom:10px">
      <div class="home-stat-label" style="color:rgba(255,255,255,0.75)">⚽ Training →</div>
      <div class="home-stat-row">
        <div class="home-stat-count" style="color:white">${trainingsAttended}<span class="home-stat-of" style="color:rgba(255,255,255,0.65)"> / ${pastTrainings.length || '—'}</span></div>
        <div style="font-size:13px;font-weight:700;color:rgba(255,255,255,0.9)">${pastTrainings.length ? trnPct + ' %' : 'Noch kein Training'}</div>
      </div>
      <div class="home-stat-bar" style="background:rgba(255,255,255,0.25)"><div class="home-stat-fill-training" style="width:${trnPct}%;background:white"></div></div>
      ${trnDetail}
    </div>
    <div class="home-stat-card" onclick="parentNavTo('events','tournament')" style="background:linear-gradient(135deg, var(--bordeaux) 0%, #9B2335 100%)">
      <div class="home-stat-label" style="color:rgba(255,255,255,0.75)">🏆 Turniere gespielt →</div>
      <div class="home-stat-row">
        <div class="home-stat-count" style="color:white">${tournamentsPlayed}<span class="home-stat-of" style="color:rgba(255,255,255,0.65)"> / ${pastTournaments.length || '—'}</span></div>
        <div style="font-size:13px;font-weight:700;color:rgba(255,255,255,0.9)">${pastTournaments.length ? tourPct + ' %' : 'Noch kein Turnier'}</div>
      </div>
      <div class="home-stat-bar" style="background:rgba(255,255,255,0.25)"><div class="home-stat-fill-tournament" style="width:${tourPct}%;background:white"></div></div>
      ${tourDetail}
    </div>`;
}

function renderParentHero(ev, playerId) {
  const isTrn = ev.type === 'training';
  const locked = isLockedForParent(ev.date);
  const started = isPast(ev.date);
  const status = getStatus(ev.id, playerId);
  const heroClass = !isTrn ? 'tournament-hero' : 'training-hero';
  const statusText = status === 'coming' ? (isTrn ? '✓ Ich bin dabei' : '✓ Ich bin verfügbar') : status === 'absent' ? '✗ Ich bin abwesend' : status === 'injured' ? '🩹 Ich bin verletzt' : '! Bitte Status wählen';
  const regCount = getAttendanceCount(ev.id);
  const maxCount = PLAYERS.length;
  const count = Math.min(regCount, maxCount);
  const pct = Math.round(count / maxCount * 100);
  const label = isTrn
    ? `${count} / ${maxCount} Mädchen dabei`
    : `${count} von ${maxCount} verfügbar`;
  const actionArea = locked
    ? `<div style="font-size:13px;color:rgba(255,255,255,0.75);margin-top:4px;background:rgba(0,0,0,0.15);border-radius:8px;padding:8px 12px">${started ? 'Event hat begonnen — nur Trainer können noch ändern' : 'Anmeldeschluss erreicht — Änderungen waren bis 5 Std. vor Start möglich'}</div>`
    : `<div class="parent-status-btns">
        <button class="parent-status-btn ${status === 'coming' ? 'active' : ''}" onclick="parentSetStatus(${ev.id}, ${playerId}, 'coming')">✓ ${isTrn ? 'Dabei' : 'Verfügbar'}</button>
        <button class="parent-status-btn ${status === 'absent' ? 'active' : ''}" onclick="parentSetStatus(${ev.id}, ${playerId}, 'absent')">✗ Absagen</button>
        <button class="parent-status-btn ${status === 'injured' ? 'active' : ''}" onclick="parentSetStatus(${ev.id}, ${playerId}, 'injured')">🩹 Verletzt</button>
      </div>`;
  return `
    <div class="parent-hero-card ${heroClass}">
      <div class="parent-hero-title">${isTrn ? '⚽ Training' : '🏆 Turnier'}</div>
      <div class="parent-hero-event">${formatDateShort(ev.date)}</div>
      <div class="parent-hero-date">${formatTime(ev.date)} Uhr · ${ev.location}</div>
      <div class="parent-status-text">${statusText}</div>
      ${actionArea}
      <div class="hero-attendance">
        <div class="hero-attendance-text">${label}</div>
        <div class="hero-attendance-bar"><div class="hero-attendance-fill" style="width:${pct}%"></div></div>
        ${!isTrn ? `<div style="font-size:11px;color:rgba(255,255,255,0.65);margin-top:6px">Coach wählt bis zu 10 fürs Aufgebot · Mitteilung via WhatsApp</div>` : ''}
      </div>
    </div>`;
}

let _parentHomeRefreshTimer = null;

function scheduleParentHomeRefresh(nextEv) {
  if (_parentHomeRefreshTimer) clearTimeout(_parentHomeRefreshTimer);
  const msUntilStart = new Date(nextEv.date) - new Date();
  if (msUntilStart > 0 && msUntilStart < 24 * 60 * 60 * 1000) {
    _parentHomeRefreshTimer = setTimeout(() => renderParentHome(), msUntilStart);
  }
}

let expandedParentEventId = null;

function toggleParentEventExpand(evId) {
  expandedParentEventId = expandedParentEventId === evId ? null : evId;
  const page = document.querySelector('.page.active');
  if (page && page.id === 'page-parent-all') renderParentAll();
  else renderParentHome();
}

function parentNavTo(section, filter) {
  parentEventFilter = filter;
  const tabs = document.querySelectorAll('#page-parent-all .tab-btn');
  const filterMap = { all: 0, training: 1, tournament: 2 };
  tabs.forEach((b, i) => b.classList.toggle('active', i === filterMap[filter]));
  showPage('page-parent-all', false);
  syncNavActive('page-parent-all');
  renderParentAll();
}

function filterParentTeam(val) {
  renderParentTeam(val);
}

function renderParentTeam(filter = '') {
  const currentPlayerId = state.currentUser && state.currentUser.playerId;
  const filtered = PLAYERS.filter(p =>
    p.name.toLowerCase().includes(filter.toLowerCase()) ||
    p.parent.toLowerCase().includes(filter.toLowerCase()) ||
    (p.nameMother && p.nameMother.toLowerCase().includes(filter.toLowerCase())) ||
    (p.nameFather && p.nameFather.toLowerCase().includes(filter.toLowerCase()))
  );
  const staffFiltered = STAFF.filter(s =>
    s.name.toLowerCase().includes(filter.toLowerCase()) ||
    s.role.toLowerCase().includes(filter.toLowerCase())
  );
  document.getElementById('parent-team-players').innerHTML = filtered.map(p => {
    const isMe = p.id === currentPlayerId;
    return `
    <div class="contact-box" style="display:flex;align-items:center;gap:12px;background:${isMe ? 'var(--bordeaux-light)' : 'var(--gray-150)'};border-radius:12px;padding:10px 14px;${isMe ? 'border:1.5px solid var(--bordeaux);' : ''}">
      <div class="avatar ${getAvatarClass(p.id - 1)}" style="width:40px;height:40px;font-size:13px;font-weight:800;flex-shrink:0">${getInitials(p.name)}</div>
      <div style="flex:1;min-width:0">
        <div class="player-name" style="font-size:14px;${isMe ? 'color:var(--bordeaux);font-weight:800;' : ''}">${p.name} <span style="font-size:12px;font-weight:800;${p.number ? 'color:var(--gray-500)' : 'color:var(--red)'}">#${p.number || '??'}</span></div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <a class="player-card-phone" href="tel:${p.phone.replace(/\s/g,'')}">${p.nameMother ? p.nameMother.split(' ')[0] + ' · ' : p.phone2 ? 'Mutter · ' : ''}${p.phone}</a>
        ${p.phone2 ? `<a class="player-card-phone" href="tel:${p.phone2.replace(/\s/g,'')}">${p.nameFather ? p.nameFather.split(' ')[0] + ' · ' : 'Vater · '}${p.phone2}</a>` : ''}
      </div>
    </div>`;
  }).join('');

  document.getElementById('parent-team-staff').innerHTML = staffFiltered.map(s => `
    <div class="contact-box" style="display:flex;align-items:center;gap:12px;background:var(--gray-150);border-radius:12px;padding:12px 14px">
      <div class="avatar" style="width:42px;height:42px;font-size:14px;font-weight:800;background:${s.photo ? `url('${s.photo}') center/cover` : '#6B1A2A'};color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0">${s.photo ? '' : getInitials(s.name)}</div>
      <div style="flex:1">
        <div class="player-name">${s.name}</div>
        <div class="player-sub">${s.role}</div>
      </div>
      ${s.phone !== '—' ? `<a class="player-card-phone" href="tel:${s.phone.replace(/\s/g,'')}">${s.phone}</a>` : ''}
    </div>`).join('');
}

function parentSetStatus(eventId, playerId, newStatus) {
  const ev = state.events.find(e => e.id === eventId);
  if (ev && isLockedForParent(ev.date)) {
    showToast(isPast(ev.date) ? 'Event hat begonnen — nur Trainer können ändern' : 'Anmeldeschluss — Änderungen bis 5 Std. vor Start möglich');
    return;
  }
  if (!state.attendance[eventId]) {
    state.attendance[eventId] = {};
    // No default — players start as 'open'
  }
  state.attendance[eventId][playerId] = newStatus;
  saveState();
  apiPatch({ action: 'setAttendance', eventId, playerId, status: newStatus });
  const msg = newStatus === 'coming' ? (ev && ev.type === 'tournament' ? '✓ Als verfügbar gemeldet' : '✓ Ich bin dabei!') : newStatus === 'absent' ? '✗ Abgesagt' : '🩹 Als verletzt gemeldet';
  showToast(msg);
  expandedParentEventId = null;
  const page = document.querySelector('.page.active');
  if (page && page.id === 'page-parent-all') renderParentAll();
  else renderParentHome();
}

// ============================================================
// PARENT ALL EVENTS
// ============================================================

let parentEventFilter = 'all';

function filterParentEvents(filter, btn) {
  parentEventFilter = filter;
  document.querySelectorAll('#page-parent-all .tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderParentAll();
}

function renderParentAll() {
  const player = PLAYERS.find(p => p.id === state.currentUser.playerId);
  if (!player) return;

  const f = parentEventFilter;
  const upcoming = getUpcomingEvents().filter(ev => f === 'all' || ev.type === f);
  const listLabel = f === 'training' ? 'Alle Trainings' : f === 'tournament' ? 'Alle Turniere' : 'Alle Events';
  const listHeader = `<div class="section-label">${listLabel}</div>`;

  const listHtml = upcoming.map(ev => renderParentEventItemFull(ev, player.id, false)).join('');
  document.getElementById('parent-all-list').innerHTML = listHeader + (listHtml || '<div class="empty-state"><div class="empty-state-icon">📅</div><div class="empty-state-text">Keine kommenden Events</div></div>');
}

function renderParentEventItemFull(ev, playerId, pastEv) {
  const isTrn = ev.type === 'training';
  const locked = isLockedForParent(ev.date);
  const started = isPast(ev.date);
  const status = getStatus(ev.id, playerId);
  const { day, month, weekday } = formatDateMini(ev.date);
  const canToggle = !pastEv && !locked;
  const badgeLabel = status === 'open' ? (canToggle ? '! Bitte melden' : 'Keine Meldung') : status === 'coming' ? (isTrn ? '✓ Dabei' : '✓ Verfügbar') : status === 'absent' ? '✗ Abwesend' : '🩹 Verletzt';
  const badgeClass = status === 'open' && !canToggle ? 'open muted' : status;
  const maxCount = PLAYERS.length;
  const count = Math.min(getAttendanceCount(ev.id), maxCount);
  const pct = Math.round(count / maxCount * 100);
  const attendLabel = isTrn ? `${count}/${maxCount}` : `${count} verfügbar`;
  const expanded = canToggle && expandedParentEventId === ev.id;
  return `
    <div class="parent-event-item ${pastEv ? 'past' : ''} ${expanded ? 'expanded' : ''}" ${canToggle ? `onclick="toggleParentEventExpand(${ev.id})" style="cursor:pointer"` : ''}>
      <div class="event-date-col">
        <div class="event-date-day">${day}</div>
        <div class="event-date-month">${month}</div>
        <div class="event-date-weekday">${weekday}</div>
      </div>
      <div class="event-info">
        <div class="event-type-badge ${isTrn ? 'badge-training' : 'badge-tournament'}">${isTrn ? '⚽ Training' : '🏆 Turnier'}</div>
        <div class="event-name">${formatTime(ev.date)} Uhr</div>
        <div class="event-meta">📍 ${ev.location}</div>
        ${!pastEv ? `<div class="event-attendance">
          <div class="event-attendance-bar"><div class="event-attendance-fill ${ev.type}" style="width:${pct}%"></div></div>
          <div class="event-attendance-label">${attendLabel}</div>
        </div>
        ${!isTrn ? `<div style="font-size:10px;color:var(--gray-500);margin-top:2px">Aufgebot max. 10 · Coach meldet via WhatsApp</div>` : ''}
        ${locked && !started ? `<div style="font-size:10px;color:var(--orange);margin-top:3px">🔒 Anmeldeschluss — Änderungen bis 5 Std. vor Start möglich</div>` : ''}` : ''}
      </div>
      <div class="parent-event-right">
        <div class="status-badge ${badgeClass}">${badgeLabel}</div>
        ${!isTrn && status === 'coming' ? (() => {
          const sq = getSquadStatus(ev.id, playerId);
          if (sq === 'in') return `<div class="parent-squad-badge in">Aufgebot ✓</div>`;
          if (sq === 'out') return `<div class="parent-squad-badge out">Nicht dabei</div>`;
          return `<div class="parent-squad-badge pending">Aufgebot offen</div>`;
        })() : ''}
        ${canToggle ? `<svg class="expand-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><polyline points="6 9 12 15 18 9"/></svg>` : ''}
      </div>
      ${expanded ? `<div class="list-status-btns" onclick="event.stopPropagation()">
        <button class="list-status-btn coming ${status === 'coming' ? 'active' : ''}" onclick="parentSetStatus(${ev.id}, ${playerId}, 'coming')">✓ ${isTrn ? 'Dabei' : 'Verfügbar'}</button>
        <button class="list-status-btn absent ${status === 'absent' ? 'active' : ''}" onclick="parentSetStatus(${ev.id}, ${playerId}, 'absent')">✗ Absagen</button>
        <button class="list-status-btn injured ${status === 'injured' ? 'active' : ''}" onclick="parentSetStatus(${ev.id}, ${playerId}, 'injured')">🩹 Verletzt</button>
      </div>` : ''}
    </div>`;
}

// ============================================================
// INIT
// ============================================================

function init() {
  loadState();
  populateChildSelect();

  // Restore session
  const session = localStorage.getItem('girlsfc_session');
  if (session) {
    try {
      state.currentUser = JSON.parse(session);
      if (state.currentUser.role === 'coach') {
        updateChildBadge();
        showPage('page-coach-home', false);
        document.getElementById('coach-nav').style.display = 'flex';
      } else if (state.currentUser.role === 'parent') {
        updateChildBadge();
        document.getElementById('parent-nav').style.display = 'flex';
        showPage('page-parent-home', false);
        syncNavActive('page-parent-home');
      }
      syncFromServer();
      startSyncPolling();
      return;
    } catch(e) {}
  }
}

let syncPollTimer = null;

function startSyncPolling() {
  if (syncPollTimer) return;
  syncPollTimer = setInterval(() => {
    if (state.currentUser && !document.hidden) syncFromServer();
  }, 20000);
}

document.addEventListener('visibilitychange', () => {
  if (!document.hidden && state.currentUser) syncFromServer();
});

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
